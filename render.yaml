# Render Blueprint — deploys API + PostgreSQL
# https://render.com/docs/blueprint-spec

databases:
  - name: enterprise-agency-db
    plan: starter
    databaseName: enterprise_agency
    user: enterprise_agency

services:
  # API Server (NestJS)
  - type: web
    name: enterprise-agency-api
    runtime: node
    plan: starter
    buildCommand: cd api && npm install -g pnpm && pnpm install --frozen-lockfile && npx prisma generate && pnpm build
    startCommand: cd api && npx prisma migrate deploy && node dist/src/main.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: enterprise-agency-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_URL
        sync: false
      - key: APP_URL
        sync: false
      - key: STORAGE_PROVIDER
        value: local
      - key: UPLOAD_PATH
        value: /opt/render/project/src/api/uploads
      - key: MAX_FILE_SIZE_MB
        value: 10

# Render Blueprint — Payload CMS (Next.js 16 + Payload 3, bun)
# The database (web_and_funnel_db) and R2 are managed outside this blueprint;
# their values are set as non-synced env vars in the dashboard.

services:
  - type: web
    name: webandfunnel
    runtime: node
    plan: standard
    rootDir: apps/cms
    buildCommand: bun install && bun run build
    startCommand: bun run start
    healthCheckPath: /admin
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URI
        sync: false
      - key: PAYLOAD_SECRET
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
